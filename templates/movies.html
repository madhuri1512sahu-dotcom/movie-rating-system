<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies</title>
</head>
<style>
    body {
        font-family: Arial;
        background: #0f2027;
        color: white;
        margin: 0;
    }

    /* 🔍 Search bar */
    .search-box {
        text-align: center;
        margin: 20px;
    }

    .search-box input {
        width: 60%;
        max-width: 350px;
        padding: 10px;
        border-radius: 5px;
        border: none;
        background: rgba(0, 0, 128, 0.15);
        color: white;
    }

    .search-box button {
        padding: 10px 15px;
        margin-left: 5px;
        cursor: pointer;
    }

    /* 🎬 Responsive container (GRID use karo) */
    .container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        padding: 20px;
    }

    /* 🎬 Card */
    .card {
        background: #081629;
        padding: 15px;
        color: white;
        border-radius: 10px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: 0.3s;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    .card:hover {
        transform: translateY(-10px);
        filter: brightness(1.2);
        border-color: rgba(0, 255, 255, 0.4);
    }


    /* 📷 Image */
    .card img {
        width: 100%;
        height: 340px;
        object-fit: cover;
        border-radius: 5px;
    }

    /* 🔘 Button */
    button {
        background: #20b2aa;
        border: none;
        color: white;
        font-weight: bold;
        padding: 6px 12px;
        border-radius: 5px;
        margin-top: 5px;
        cursor: pointer;
    }

    button:hover {
        filter: brightness(1.2);
        box-shadow: 0 0 15px rgba(32, 178, 170, 0.5);
    }

    select {
        padding: 5px;
        margin-top: 5px;
    }

    /* 📱 Mobile */
    @media (max-width: 600px) {
        .search-box input {
            width: 80%;
        }

        .card img {
            height: 220px;
        }
    }

    /* 📱 Tablet */
    @media (max-width: 900px) {
        .container {
            grid-template-columns: repeat(2, 1fr);
        }
    }

    /* 💻 Desktop */
    @media (min-width: 901px) {
        .container {
            grid-template-columns: repeat(4, 1fr);
        }
    }
</style>

<body>

    <!-- 🔍 Search Bar -->
    <div class="search-box">
        <form method="GET" action="/movies">
            <input type="text" id="searchInput" name="search" placeholder="Search movie..."
                value="{{request.args.get('search','')}}">
            <button type="submit">Search</button>
        </form>

        <!-- 🔥 Suggestion list -->
        <div id="suggestions"></div>
    </div>

    <!-- 🎬 Movies -->
    <div class="container">

        {% for movie in movies %}

        <div class="card">

            <a href="{{ url_for('watch_movie', id=movie.movie._id) }}">
               <img src="{{ movie.movie.poster or 'https://via.placeholder.com/200' }}" alt="poster">
            </a>

            <h3>{{movie.movie.movieName}}</h3>

            <p>{{movie.movie.genre}}</p>

            <p>⭐ {{movie.avg_rating}} ({{movie.total_ratings}})</p>

            {% if session.get("role") != "admin" %}
            <form action="/rate/{{movie.movie._id}}" method="POST">
                <select name="rating" required>
                    <option value="">Rate</option>
                    <option value="1">⭐ 1</option>
                    <option value="2">⭐⭐ 2</option>
                    <option value="3">⭐⭐⭐ 3</option>
                    <option value="4">⭐⭐⭐⭐ 4</option>
                    <option value="5">⭐⭐⭐⭐⭐ 5</option>
                </select>

                <button type="submit">Submit</button>
            </form>
            {% endif %}

            {% if session.get("role") == "admin" %}
            <a href="/delete_movie/{{movie.movie._id}}">
                <button>Delete</button>
            </a>
            {% endif %}

        </div>

        {% endfor %}

    </div>

</body>
<script>
    const input = document.getElementById("searchInput");
    const suggestionsBox = document.getElementById("suggestions");

    input.addEventListener("input", function () {

        let value = this.value;

        if (value.length === 0) {
            suggestionsBox.innerHTML = "";
            return;
        }

        fetch(`/search_suggestions?q=${value}`)
            .then(res => res.json())
            .then(data => {

                let html = "";

                if (data.suggestions.length === 0) {
                    html = "<div class='suggestion-item'>❌ Movie Not Found</div>";
                } else {
                    data.suggestions.forEach(movie => {
                        html += `<div class='suggestion-item' onclick="selectMovie('${movie}')">${movie}</div>`;
                    });
                }

                suggestionsBox.innerHTML = html;
            });
    });

    function selectMovie(name) {
        input.value = name;
        suggestionsBox.innerHTML = "";
    }
</script>

</html>
