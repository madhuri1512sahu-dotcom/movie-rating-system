<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Madhuri Movie Rating System</title>
    <meta name="description" content="Watch trailers and rate movies on Madhuri's platform.">
    <meta name="keywords" content="Movies, Trailer, Rating, Madhuri Sahu Project">
    
</head>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background: url("static/movie.jpg") no-repeat center center fixed;
    background-size: cover;
  }

  .index {
    background-color: rgba(0, 0, 0, 0.6);
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    text-align: center;
    backdrop-filter: blur(4px);
  }

  h1 {
    font-size: 48px;
    color: #00ffff;
    margin-bottom: 5px;
  }

  p {
    font-size: 18px;
    max-width: 600px;
    margin-bottom: 35px;
  }

  .index a {
    text-decoration: none;
    color: white;
    background-color: #00ffff;
    padding: 12px 24px;
    margin: 0 10px;
    border-radius: 5px;
    font-weight: bold;
    transition: 0.3s ease;
  }

  .index a:hover {
    filter: brightness(1.2);
    box-shadow: 0 0 15px rgba(32, 178, 170, 0.5);
  }

  .index a.cyan {
    background: #008b8b;
  }
</style>

<body>
  <div class="index">
    <h1>🎬 <br> Movie Rating System</h1>
    <p>Discover, rate and review your favorite movies.
      Join our community and share your opinions!</p>
    <nav>
      <a href="/register">Register</a>
      <a href="/login">Login</a>
    </nav>
  </div>
</body>

</html>
